name: Release @jamjet/claude-code-hook

on:
  push:
    tags:
      - 'claude-code-hook-v*'

jobs:
  publish:
    name: Publish @jamjet/claude-code-hook
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/claude-code-hook
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup with no `version:` reads "packageManager" from
      # the root package.json (pnpm@9.0.0). Avoids ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: cd ../.. && pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm with provenance
        # Use npx to fetch a fresh npm without overwriting the system bundle.
        # --provenance requires a public GitHub repo (sigstore signs the
        # source URL); jamjet-policy is public, so this works.
        run: npx npm@latest publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
